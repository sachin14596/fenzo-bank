name: dbt Docs

on:
  push:
    branches:
      - main

jobs:
  dbt-docs:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt
        run: pip install dbt-bigquery==1.8.2

      - name: Setup GCP credentials
        run: |
          echo '${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}' > /tmp/keyfile.json

      - name: Setup dbt profiles
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          fenzo_dbt:
            target: dev
            outputs:
              dev:
                type: bigquery
                method: service-account
                project: fenzo-bank
                dataset: dbt_dev
                keyfile: /tmp/keyfile.json
                location: europe-west2
                threads: 4
                timeout_seconds: 300
          EOF

      - name: Install dbt packages
        run: |
          cd fenzo_dbt
          dbt deps

      - name: Generate dbt docs
        run: |
          cd fenzo_dbt
          dbt docs generate

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: fenzo_dbt/target/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4